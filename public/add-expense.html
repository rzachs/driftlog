<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driftlog — Add Expense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --white-0:#ffffff; --blue-50:#4589ff; --blue-60:#0f62fe; --blue-80:#002d9c;
      --gray-40:#a8a8a8; --gray-100:#161616;
      --font-family-sans:'IBM Plex Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      --background:#ffffff; --text-primary:#161616; --text-secondary:#525252;
      --text-placeholder:rgba(22,22,22,0.4); --text-on-color:#ffffff;
      --layer-01:#f4f4f4; --layer-02:#ffffff;
      --field-01:#f4f4f4; --field-02:#ffffff;
      --border-subtle-00:#e0e0e0; --border-subtle-01:#c6c6c6; --border-strong-01:#8d8d8d;
      --link-primary:#0f62fe; --support-success:#24a148; --support-error:#da1e28; --focus:#0f62fe;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--background);font-family:var(--font-family-sans);color:var(--text-primary)}
    .dl-field{font-family:var(--font-family-sans);border:none;border-bottom:1px solid var(--border-strong-01);background:var(--field-01);color:var(--text-primary);font-size:0.875rem;padding:0 16px}
    .dl-field:focus{outline:2px solid var(--focus);outline-offset:-2px}
    .dl-field::placeholder{color:var(--text-placeholder)}
    select.dl-field{-webkit-appearance:none;appearance:none;cursor:pointer}
    .dl-btn-p{border:none;background:var(--blue-60);color:var(--text-on-color);font-size:0.875rem;font-family:var(--font-family-sans);letter-spacing:0.16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:0 16px;transition:background 110ms}
    .dl-btn-p:hover{background:#0050e6} .dl-btn-p:active{background:var(--blue-80)}
    .dl-btn-s{border:none;background:var(--gray-100);color:var(--text-on-color);font-size:0.875rem;font-family:var(--font-family-sans);letter-spacing:0.16px;cursor:pointer;display:flex;align-items:center;padding:0 16px;transition:background 110ms;text-decoration:none}
    .dl-btn-s:hover{background:#393939}
    .dl-back{display:inline-flex;align-items:center;gap:8px;font-size:0.875rem;color:var(--link-primary);text-decoration:none}
    .dl-back:hover{text-decoration:underline}
    .split-row{display:flex;align-items:center;gap:12px;padding:0 16px;min-height:56px;border-bottom:1px solid var(--border-subtle-00)}
    .split-row:last-child{border-bottom:none}
    .radio-dot{width:18px;height:18px;border-radius:50%;border:1px solid var(--border-strong-01);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
    .radio-dot .dot{width:8px;height:8px;border-radius:50%;background:var(--blue-60);display:none}
    .radio-dot.active .dot{display:block}
  </style>
</head>
<body>

<header style="height:48px;background:var(--gray-100);color:var(--white-0);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:10;">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:20px;height:20px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;">
      <span style="color:var(--white-0);font-weight:600;font-size:0.8125rem;line-height:1;">$</span>
    </div>
    <span style="font-size:0.875rem;"><span style="font-weight:600;">Driftlog</span> <span style="color:var(--gray-40);">Trips</span></span>
  </div>
</header>

<main style="max-width:640px;margin:0 auto;padding:32px 16px 120px;">
  <a id="back-link" href="trips.html" class="dl-back" style="margin-bottom:24px;display:inline-flex;">
    <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor"><path d="M14 26l1.41-1.41L7.83 17H28v-2H7.83l7.59-7.59L14 6 4 16z"/></svg>
    Back
  </a>
  <h1 style="margin:0 0 40px;font-size:1.75rem;line-height:1.28572;font-weight:400;">Add expense</h1>

  <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:8px;">Amount</label>
  <div style="display:flex;align-items:stretch;margin-bottom:32px;border-bottom:1px solid var(--border-strong-01);background:var(--field-01);">
    <span style="display:flex;align-items:center;padding:0 16px;font-size:1.75rem;font-weight:300;color:var(--text-secondary);">€</span>
    <input class="dl-field" type="text" inputmode="decimal" id="amount" placeholder="0.00" style="flex:1;height:64px;border:none;background:transparent;color:var(--text-primary);font-size:1.75rem;font-weight:300;padding:0;font-variant-numeric:tabular-nums;">
  </div>

  <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:8px;">Description</label>
  <input class="dl-field" type="text" id="desc" placeholder="e.g. Dinner at Time Out Market" style="width:100%;height:48px;margin-bottom:32px;">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;">
    <div>
      <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:8px;">Paid by</label>
      <div style="position:relative;">
        <select class="dl-field" id="payer" style="width:100%;height:48px;padding:0 40px 0 16px;"></select>
        <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor" style="position:absolute;right:16px;top:16px;pointer-events:none;opacity:0.7;"><path d="M16 22L6 12l1.414-1.414L16 19.172l8.586-8.586L26 12z"/></svg>
      </div>
    </div>
    <div>
      <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:8px;">Date</label>
      <input class="dl-field" type="date" id="date" style="width:100%;height:48px;">
    </div>
  </div>

  <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:12px;">Split method</label>
  <div style="display:flex;gap:32px;margin-bottom:32px;">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;">
      <span class="radio-dot active" id="radio-even" onclick="setMethod('even')"><span class="dot"></span></span>
      <span onclick="setMethod('even')">Split evenly</span>
    </label>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;">
      <span class="radio-dot" id="radio-custom" onclick="setMethod('custom')"><span class="dot"></span></span>
      <span onclick="setMethod('custom')">Custom amounts</span>
    </label>
  </div>

  <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;">
    <label style="font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);">Split between</label>
    <span id="remain-note" style="font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);"></span>
  </div>
  <div id="split-table" style="border:1px solid var(--border-subtle-01);margin-bottom:48px;"></div>
</main>

<div style="position:fixed;bottom:0;left:0;right:0;display:flex;height:64px;border-top:1px solid var(--border-subtle-01);">
  <a id="cancel-link" href="trips.html" class="dl-btn-s" style="flex:1;max-width:50%;">Cancel</a>
  <button class="dl-btn-p" id="add-btn" style="flex:1;max-width:50%;height:64px;">
    <span>Add expense</span>
    <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><path d="M17 15V8h-2v7H8v2h7v7h2v-7h7v-2z"/></svg>
  </button>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const tripId = params.get('tripId');
  if (!tripId) location.href = 'trips.html';

  const COLORS = ['#0f62fe','#007d79','#8a3ffc','#d02670','#0072c3','#6f6f6f'];
  function col(i) { return COLORS[i % COLORS.length]; }
  function fmt(n) { return '€' + Math.abs(n).toLocaleString('en-IE',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  let members = [];
  const state = { method: 'even', selected: {}, custom: {} };

  async function init() {
    const trip = await fetch(`/api/trips/${tripId}`).then(r => r.json());
    document.getElementById('back-link').href = `trip-overview.html?id=${tripId}`;
    document.getElementById('back-link').innerHTML = `<svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor"><path d="M14 26l1.41-1.41L7.83 17H28v-2H7.83l7.59-7.59L14 6 4 16z"/></svg> ${trip.name}`;
    document.getElementById('cancel-link').href = `trip-overview.html?id=${tripId}`;

    members = trip.members;
    const payerSel = document.getElementById('payer');
    members.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      payerSel.appendChild(opt);
    });
    members.forEach(m => { state.selected[m.id] = true; state.custom[m.id] = ''; });

    document.getElementById('date').value = new Date().toISOString().slice(0,10);
    render();
  }

  function getAmount() { return parseFloat(document.getElementById('amount').value) || 0; }

  function render() {
    const total = getAmount();
    const sel = members.filter(m => state.selected[m.id]);
    const evenShare = sel.length ? total / sel.length : 0;
    const isCustom = state.method === 'custom';
    const customSum = sel.reduce((a,m) => a + (parseFloat(state.custom[m.id]) || 0), 0);
    const remaining = total - customSum;

    const noteEl = document.getElementById('remain-note');
    if (isCustom) {
      const r = Math.round(remaining * 100) / 100;
      if (Math.abs(r) < 0.005) { noteEl.textContent = 'Fully allocated'; noteEl.style.color = '#24a148'; }
      else if (r > 0) { noteEl.textContent = fmt(r) + ' left'; noteEl.style.color = '#da1e28'; }
      else { noteEl.textContent = fmt(-r) + ' over'; noteEl.style.color = '#da1e28'; }
    } else {
      noteEl.textContent = sel.length + ' people · ' + fmt(evenShare) + ' each';
      noteEl.style.color = 'var(--text-secondary)';
    }

    const table = document.getElementById('split-table');
    table.innerHTML = '';
    members.forEach((m, i) => {
      const checked = !!state.selected[m.id];
      const row = document.createElement('div');
      row.className = 'split-row';
      row.style.background = checked ? 'var(--layer-02)' : 'var(--layer-01)';

      const cb = document.createElement('span');
      cb.style.cssText = `width:18px;height:18px;flex:none;border:1px solid var(--border-strong-01);display:flex;align-items:center;justify-content:center;cursor:pointer;`;
      if (checked) { cb.style.background = '#0f62fe'; cb.style.borderColor = '#0f62fe'; cb.innerHTML = '<svg width="14" height="14" viewBox="0 0 32 32" fill="white"><path d="M13 24L4 15l1.414-1.414L13 21.171 26.586 7.586 28 9z"/></svg>'; }
      cb.addEventListener('click', () => { state.selected[m.id] = !state.selected[m.id]; render(); });

      const av = document.createElement('div');
      av.style.cssText = `width:28px;height:28px;border-radius:50%;background:${col(i)};color:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-size:0.6875rem;font-weight:600;`;
      av.textContent = m.name.slice(0,2).toUpperCase();

      const nm = document.createElement('span');
      nm.style.cssText = `flex:1;font-size:0.875rem;cursor:pointer;color:${checked?'var(--text-primary)':'var(--text-secondary)'};`;
      nm.textContent = m.name;
      nm.addEventListener('click', () => { state.selected[m.id] = !state.selected[m.id]; render(); });

      row.appendChild(cb); row.appendChild(av); row.appendChild(nm);

      if (isCustom) {
        const wrap = document.createElement('div');
        wrap.style.cssText = `display:flex;align-items:center;gap:4px;opacity:${checked?'1':'0.35'};`;
        wrap.innerHTML = '<span style="font-size:0.875rem;color:var(--text-secondary);">€</span>';
        const inp = document.createElement('input');
        inp.className = 'dl-field';
        inp.type = 'text'; inp.inputMode = 'decimal';
        inp.value = state.custom[m.id]; inp.disabled = !checked;
        inp.style.cssText = 'width:80px;height:40px;border:none;border-bottom:1px solid var(--border-strong-01);background:var(--field-02);color:var(--text-primary);font-size:0.875rem;padding:0 8px;text-align:right;font-variant-numeric:tabular-nums;';
        inp.addEventListener('input', e => { state.custom[m.id] = e.target.value; render(); });
        wrap.appendChild(inp);
        row.appendChild(wrap);
      } else {
        const sh = document.createElement('span');
        sh.style.cssText = `font-size:0.875rem;color:${checked?'var(--text-primary)':'var(--text-secondary)'};font-variant-numeric:tabular-nums;`;
        sh.textContent = checked ? fmt(evenShare) : '—';
        row.appendChild(sh);
      }
      table.appendChild(row);
    });
  }

  function setMethod(m) {
    state.method = m;
    document.getElementById('radio-even').classList.toggle('active', m === 'even');
    document.getElementById('radio-custom').classList.toggle('active', m === 'custom');
    render();
  }

  document.getElementById('amount').addEventListener('input', render);

  document.getElementById('add-btn').addEventListener('click', async () => {
    const amount = getAmount();
    const description = document.getElementById('desc').value.trim();
    const paidById = document.getElementById('payer').value;
    const date = document.getElementById('date').value;
    if (!amount || !description || !paidById || !date) return;

    const sel = members.filter(m => state.selected[m.id]);
    if (!sel.length) return;
    const isCustom = state.method === 'custom';
    const splits = sel.map(m => ({
      personId: m.id,
      amount: isCustom ? (parseFloat(state.custom[m.id]) || 0) : amount / sel.length,
    }));

    await fetch(`/api/trips/${tripId}/expenses`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description, amount, paidById, date, splits }),
    });
    location.href = `trip-overview.html?id=${tripId}`;
  });

  init();
</script>
</body>
</html>
