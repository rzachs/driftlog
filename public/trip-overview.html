<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driftlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --white-0:#ffffff; --blue-20:#d0e2ff; --blue-50:#4589ff; --blue-60:#0f62fe;
      --blue-70:#0043ce; --blue-80:#002d9c; --gray-40:#a8a8a8; --gray-100:#161616;
      --teal-60:#007d79; --purple-60:#8a3ffc; --magenta-60:#d02670;
      --font-family-sans:'IBM Plex Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      --background:#ffffff; --text-primary:#161616; --text-secondary:#525252;
      --text-on-color:#ffffff; --layer-01:#f4f4f4; --layer-02:#ffffff;
      --layer-hover-01:#e8e8e8; --layer-hover-02:#e8e8e8;
      --border-subtle-00:#e0e0e0; --border-subtle-01:#c6c6c6;
      --link-primary:#0f62fe; --icon-secondary:#525252;
      --support-success:#24a148; --support-error:#da1e28;
      --background-hover:rgba(141,141,141,0.12);
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--background);font-family:var(--font-family-sans);color:var(--text-primary)}
    .dl-row:hover{background:var(--layer-hover-01)}
    .dl-btn:hover{background:#0050e6} .dl-btn:active{background:var(--blue-80)}
    .dl-hicon:hover{background:var(--layer-hover-02)}
    .dl-ghost:hover{background:var(--background-hover)}
  </style>
</head>
<body>

<header style="height:48px;background:var(--gray-100);color:var(--white-0);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:10;">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:20px;height:20px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;">
      <span style="color:var(--white-0);font-weight:600;font-size:0.8125rem;line-height:1;">$</span>
    </div>
    <a href="trips.html" style="font-size:0.875rem;text-decoration:none;color:inherit;"><span style="font-weight:600;">Driftlog</span> <span style="color:var(--gray-40);">Trips</span></a>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;height:100%;">
    <button class="dl-hicon" aria-label="Settings" style="width:48px;height:48px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="white"><path d="M27 16.76V15.24l1.92-3.23-4.03-6.96-3.6 1.33-1.3-.75-.46-3.63H13.5l-.45 3.63-1.3.75-3.61-1.33L4.1 12l1.91 3.22V16.76L4.1 20l4.03 6.96 3.61-1.33 1.3.75.45 3.62H18.5l.46-3.62 1.3-.75 3.6 1.33L27.9 20zm-2.34 2.93-1.58 2.74-3.23-1.2-2.2 1.27-.41 3.25h-3.17l-.4-3.25-2.2-1.27-3.22 1.2L7.3 19.7l1.73-2.92v-1.56L7.3 12.3l1.62-2.77 3.22 1.2 2.2-1.27.4-3.26h3.17l.41 3.26 2.2 1.27 3.23-1.2 1.58 2.74-1.73 2.94v1.55z"/><path d="M16 20a4 4 0 1 1 4-4 4 4 0 0 1-4 4zm0-6a2 2 0 1 0 2 2 2 2 0 0 0-2-2z"/></svg>
    </button>
    <div style="width:32px;height:32px;border-radius:50%;background:var(--blue-60);color:var(--white-0);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;margin-left:8px;">YO</div>
  </div>
</header>

<main id="main" style="max-width:1056px;margin:0 auto;padding:48px 16px 80px;">
  <div style="padding:40px;text-align:center;color:var(--text-secondary);">Loading…</div>
</main>

<script>
  const COLORS = ['#0f62fe','#007d79','#8a3ffc','#d02670','#0072c3','#6f6f6f'];
  function col(i) { return COLORS[i % COLORS.length]; }
  function fmt(n) { return '€' + Math.abs(n).toLocaleString('en-IE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
  function initials(name) { return name.slice(0,2).toUpperCase(); }

  const params = new URLSearchParams(location.search);
  const tripId = params.get('id');
  if (!tripId) location.href = 'trips.html';

  async function load() {
    const trip = await fetch(`/api/trips/${tripId}`).then(r => r.json());
    if (trip.error) { location.href = 'trips.html'; return; }
    document.title = `Driftlog — ${trip.name}`;
    render(trip);
  }

  function render(trip) {
    const { members, balances, expenses } = trip;
    const memberColorMap = {};
    members.forEach((m,i) => { memberColorMap[m.id] = col(i); });

    const totalAmt = expenses.reduce((s,e) => s + e.amount, 0);
    const dateStr = [trip.start_date, trip.end_date].filter(Boolean).map(fmtDate).join(' – ') || '—';

    const avatarStack = members.slice(0,4).map((m,i) =>
      `<div title="${m.name}" style="width:28px;height:28px;border-radius:50%;background:${col(i)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.6875rem;font-weight:600;${i>0?'margin-left:-6px;':''}border:2px solid var(--background);">${initials(m.name)}</div>`
    ).join('');

    const balCards = balances.map((b,i) => {
      const owed = b.balance > 0;
      const accentColor = owed ? 'var(--support-success)' : 'var(--support-error)';
      const statusLabel = b.name === 'You' ? 'You are owed' : (owed ? 'Is owed' : 'Owes the group');
      return `
        <a href="person-detail.html?tripId=${tripId}&memberId=${b.id}" class="dl-row" style="display:block;background:var(--layer-02);padding:20px;text-decoration:none;color:inherit;border-top:3px solid ${accentColor};">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
            <div style="width:28px;height:28px;border-radius:50%;background:${col(i)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.6875rem;font-weight:600;">${initials(b.name)}</div>
            <span style="font-size:0.875rem;font-weight:600;">${b.name}</span>
          </div>
          <p style="margin:0 0 2px;font-size:1.75rem;line-height:1.28572;font-weight:400;color:${owed?'var(--support-success)':'var(--text-primary)'};">${fmt(Math.abs(b.balance))}</p>
          <p style="margin:0;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);">${statusLabel}</p>
        </a>`;
    }).join('');

    const expRows = expenses.map(exp => {
      const payerIdx = members.findIndex(m => m.id === exp.paid_by_id);
      const payerColor = col(payerIdx >= 0 ? payerIdx : 0);
      const payerName = exp.payer?.name || '?';
      const waysCount = exp.splits?.length || 0;
      return `
        <div class="dl-row" style="display:grid;grid-template-columns:1fr 140px 140px 120px 40px;align-items:center;padding:0 16px;min-height:56px;border-bottom:1px solid var(--border-subtle-00);transition:background 70ms;cursor:pointer;" onclick="location.href='person-detail.html?tripId=${tripId}&memberId=${members[0]?.id}'">
          <div style="display:flex;align-items:center;gap:12px;min-width:0;padding:8px 0;">
            <div style="width:32px;height:32px;border-radius:50%;background:${payerColor};color:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-size:0.6875rem;font-weight:600;">${initials(payerName)}</div>
            <div style="min-width:0;">
              <p style="margin:0;font-size:0.875rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${exp.description}</p>
              <p style="margin:2px 0 0;font-size:0.75rem;color:var(--text-secondary);">${payerName === 'You' ? 'You paid' : payerName + ' paid'}</p>
            </div>
          </div>
          <span style="font-size:0.875rem;color:var(--text-secondary);">${exp.date}</span>
          <span style="font-size:0.875rem;color:var(--text-secondary);">Split ${waysCount} ways</span>
          <span style="font-size:0.875rem;text-align:right;font-variant-numeric:tabular-nums;">${fmt(exp.amount)}</span>
          <span style="display:flex;justify-content:flex-end;"><svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor" style="opacity:0.5"><path d="M22 16L12 26l-1.414-1.414L19.172 16l-8.586-8.586L12 6z"/></svg></span>
        </div>`;
    }).join('');

    document.getElementById('main').innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:24px;margin-bottom:48px;">
        <div style="min-width:0;">
          <p style="margin:0 0 8px;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);text-transform:uppercase;">Trip</p>
          <h1 style="margin:0 0 12px;font-size:2rem;line-height:1.25;font-weight:400;">${trip.name}</h1>
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
            <span style="display:inline-flex;align-items:center;gap:8px;font-size:0.875rem;color:var(--text-secondary);">
              <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor" style="opacity:0.6"><path d="M26 4h-4V2h-2v2h-8V2h-2v2H6C4.9 4 4 4.9 4 6v20c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 22H6V12h20v14zm0-16H6V6h4v2h2V6h8v2h2V6h4v4z"/></svg>
              ${dateStr}
            </span>
            <span style="width:1px;height:16px;background:var(--border-subtle-01);"></span>
            <div style="display:flex;align-items:center;">${avatarStack}<span style="margin-left:12px;font-size:0.875rem;color:var(--text-secondary);">${members.length} people</span></div>
          </div>
        </div>
        <a href="add-expense.html?tripId=${tripId}" class="dl-btn" style="margin-left:auto;flex:none;height:48px;background:var(--blue-60);color:var(--text-on-color);font-size:0.875rem;letter-spacing:0.16px;text-decoration:none;display:inline-flex;align-items:center;gap:48px;padding:0 16px;transition:background 110ms;">
          <span>Add expense</span>
          <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><path d="M17 15V8h-2v7H8v2h7v7h2v-7h7v-2z"/></svg>
        </a>
      </div>

      <h2 style="margin:0 0 16px;font-size:0.875rem;font-weight:600;letter-spacing:0.16px;">Balances</h2>
      <div style="display:grid;grid-template-columns:repeat(${members.length},1fr);gap:1px;background:var(--border-subtle-01);border:1px solid var(--border-subtle-01);margin-bottom:48px;">${balCards}</div>

      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;">
        <h2 style="margin:0;font-size:0.875rem;font-weight:600;letter-spacing:0.16px;">Recent expenses</h2>
        <span style="font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);">${expenses.length} expense${expenses.length!==1?'s':''} · ${fmt(totalAmt)} total</span>
      </div>
      <div style="border:1px solid var(--border-subtle-01);">
        <div style="display:grid;grid-template-columns:1fr 140px 140px 120px 40px;align-items:center;padding:0 16px;height:40px;background:var(--layer-01);border-bottom:1px solid var(--border-subtle-01);">
          <span style="font-size:0.75rem;font-weight:600;letter-spacing:0.32px;color:var(--text-secondary);">Description</span>
          <span style="font-size:0.75rem;font-weight:600;letter-spacing:0.32px;color:var(--text-secondary);">Date</span>
          <span style="font-size:0.75rem;font-weight:600;letter-spacing:0.32px;color:var(--text-secondary);">Split</span>
          <span style="font-size:0.75rem;font-weight:600;letter-spacing:0.32px;color:var(--text-secondary);text-align:right;">Amount</span>
          <span></span>
        </div>
        ${expRows || '<div style="padding:24px 16px;color:var(--text-secondary);font-size:0.875rem;">No expenses yet.</div>'}
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;gap:24px;margin-top:32px;padding:24px;background:var(--layer-01);border-left:3px solid var(--blue-60);">
        <div>
          <p style="margin:0 0 4px;font-size:1rem;font-weight:600;">Ready to settle up?</p>
          <p style="margin:0;font-size:0.875rem;color:var(--text-secondary);">Clear all balances with the fewest possible payments.</p>
        </div>
        <a href="settle-up.html?tripId=${tripId}" class="dl-ghost" style="flex:none;height:48px;display:inline-flex;align-items:center;gap:48px;padding:0 16px;border:1px solid var(--blue-60);color:var(--link-primary);font-size:0.875rem;letter-spacing:0.16px;text-decoration:none;transition:background 110ms;font-family:var(--font-family-sans);">
          <span>Settle up</span>
          <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><path d="M18 6l-1.43 1.393L24.15 15H4v2h20.15l-7.58 7.573L18 26l10-10z"/></svg>
        </a>
      </div>`;
  }

  load();
</script>
</body>
</html>
