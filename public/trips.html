<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driftlog — Your Trips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --white-0:#ffffff; --blue-20:#d0e2ff; --blue-50:#4589ff; --blue-60:#0f62fe;
      --blue-70:#0043ce; --blue-80:#002d9c; --gray-40:#a8a8a8; --gray-60:#6f6f6f;
      --gray-80:#393939; --gray-100:#161616; --teal-60:#007d79; --purple-60:#8a3ffc;
      --magenta-60:#d02670; --cyan-60:#0072c3;
      --font-family-sans:'IBM Plex Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      --background:#ffffff; --text-primary:#161616; --text-secondary:#525252;
      --text-placeholder:rgba(22,22,22,0.4); --text-on-color:#ffffff;
      --layer-01:#f4f4f4; --layer-02:#ffffff; --layer-hover-01:#e8e8e8;
      --layer-hover-02:#e8e8e8; --field-01:#f4f4f4; --field-02:#ffffff;
      --field-hover-01:#e8e8e8; --border-subtle-00:#e0e0e0; --border-subtle-01:#c6c6c6;
      --border-strong-01:#8d8d8d; --icon-secondary:#525252; --support-success:#24a148;
      --focus:#0f62fe; --overlay:rgba(0,0,0,0.6);
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--layer-01);font-family:var(--font-family-sans);color:var(--text-primary)}
    .dl-row{transition:background 70ms} .dl-row:hover{background:var(--layer-hover-01)}
    .dl-btn{height:48px;border:none;background:var(--blue-60);color:var(--text-on-color);font-size:0.875rem;font-family:var(--font-family-sans);letter-spacing:0.16px;cursor:pointer;display:inline-flex;align-items:center;gap:48px;padding:0 16px;transition:background 110ms;text-decoration:none}
    .dl-btn:hover{background:#0050e6} .dl-btn:active{background:var(--blue-80)}
    .dl-btn-s{border:none;background:var(--gray-100);color:var(--white-0);font-size:0.875rem;font-family:var(--font-family-sans);letter-spacing:0.16px;cursor:pointer;display:flex;align-items:center;padding:0 16px;transition:background 110ms}
    .dl-btn-s:hover{background:var(--gray-80)}
    .dl-hicon{border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .dl-hicon:hover{background:var(--layer-hover-02)}
    .dl-field{font-family:var(--font-family-sans);border:none;border-bottom:1px solid var(--border-strong-01);background:var(--field-01);color:var(--text-primary);font-size:0.875rem;padding:0 16px}
    .dl-field:focus{outline:2px solid var(--focus);outline-offset:-2px}
    .dl-field::placeholder{color:var(--text-placeholder)}
    .dl-chipx{width:24px;height:24px;border:none;background:transparent;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0}
    .dl-chipx:hover{background:rgba(255,255,255,0.25)}
  </style>
</head>
<body>

<header style="height:48px;background:var(--gray-100);color:var(--white-0);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:10;">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:20px;height:20px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;">
      <span style="color:var(--white-0);font-weight:600;font-size:0.8125rem;line-height:1;">$</span>
    </div>
    <span style="font-size:0.875rem;"><span style="font-weight:600;">Driftlog</span> <span style="color:var(--gray-40);">Trips</span></span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;height:100%;">
    <button class="dl-hicon" aria-label="Settings" style="width:48px;height:48px;">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="white"><path d="M27 16.76V15.24l1.92-3.23-4.03-6.96-3.6 1.33-1.3-.75-.46-3.63H13.5l-.45 3.63-1.3.75-3.61-1.33L4.1 12l1.91 3.22V16.76L4.1 20l4.03 6.96 3.61-1.33 1.3.75.45 3.62H18.5l.46-3.62 1.3-.75 3.6 1.33L27.9 20zm-2.34 2.93-1.58 2.74-3.23-1.2-2.2 1.27-.41 3.25h-3.17l-.4-3.25-2.2-1.27-3.22 1.2L7.3 19.7l1.73-2.92v-1.56L7.3 12.3l1.62-2.77 3.22 1.2 2.2-1.27.4-3.26h3.17l.41 3.26 2.2 1.27 3.23-1.2 1.58 2.74-1.73 2.94v1.55z"/><path d="M16 20a4 4 0 1 1 4-4 4 4 0 0 1-4 4zm0-6a2 2 0 1 0 2 2 2 2 0 0 0-2-2z"/></svg>
    </button>
    <div style="width:32px;height:32px;border-radius:50%;background:var(--blue-60);color:var(--white-0);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;margin-left:8px;">YO</div>
  </div>
</header>

<main style="max-width:880px;margin:0 auto;padding:48px 16px 80px;">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:32px;">
    <div>
      <h1 style="margin:0 0 6px;font-size:2rem;line-height:1.25;font-weight:400;">Your trips</h1>
      <p id="summary-line" style="margin:0;font-size:0.875rem;color:var(--text-secondary);">Loading…</p>
    </div>
    <button class="dl-btn" id="open-modal">
      <span style="white-space:nowrap;">Create trip</span>
      <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><path d="M17 15V8h-2v7H8v2h7v7h2v-7h7v-2z"/></svg>
    </button>
  </div>

  <div id="trip-list" style="border:1px solid var(--border-subtle-01);background:var(--layer-02);">
    <div style="padding:40px;text-align:center;color:var(--text-secondary);">Loading trips…</div>
  </div>
</main>

<!-- Create trip modal -->
<div id="modal" style="display:none;position:fixed;inset:0;background:var(--overlay);z-index:50;align-items:center;justify-content:center;padding:24px;" aria-modal="true" role="dialog">
  <div id="modal-content" style="width:100%;max-width:480px;background:var(--layer-02);box-shadow:0 4px 16px rgba(0,0,0,0.3);">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:20px 20px 8px;">
      <div>
        <p style="margin:0 0 2px;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);">Driftlog</p>
        <h2 style="margin:0;font-size:1.25rem;font-weight:400;">Create trip</h2>
      </div>
      <button class="dl-hicon" id="close-modal" aria-label="Close" style="width:40px;height:40px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--icon-secondary);">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><path d="M24 9.4L22.6 8 16 14.6 9.4 8 8 9.4l6.6 6.6L8 22.6 9.4 24l6.6-6.6 6.6 6.6 1.4-1.4-6.6-6.6z"/></svg>
      </button>
    </div>
    <div style="padding:16px 20px 24px;">
      <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:8px;">Trip name</label>
      <input class="dl-field" type="text" id="trip-name" placeholder="e.g. Lisbon long weekend" style="width:100%;height:48px;margin-bottom:24px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
        <div>
          <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:8px;">Start date</label>
          <input class="dl-field" type="date" id="start-date" style="width:100%;height:48px;">
        </div>
        <div>
          <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:8px;">End date</label>
          <input class="dl-field" type="date" id="end-date" style="width:100%;height:48px;">
        </div>
      </div>
      <label style="display:block;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);margin-bottom:8px;">People</label>
      <div id="chips" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
      <input class="dl-field" type="text" id="new-person" placeholder="Type a name, press Enter to add" style="width:100%;height:40px;">
    </div>
    <div style="display:flex;height:64px;border-top:1px solid var(--border-subtle-01);">
      <button class="dl-btn-s" id="cancel-modal" style="flex:1;">Cancel</button>
      <button class="dl-btn" id="create-trip" style="flex:1;justify-content:space-between;">
        <span>Create trip</span>
        <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><path d="M18 6l-1.43 1.393L24.15 15H4v2h20.15l-7.58 7.573L18 26l10-10z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const AVATAR_COLORS = ['#0f62fe','#007d79','#8a3ffc','#d02670','#0072c3','#6f6f6f','#393939'];
  function avatarColor(i) { return AVATAR_COLORS[i % AVATAR_COLORS.length]; }
  function fmt(n) { return (n >= 0 ? '+' : '−') + '€' + Math.abs(n).toLocaleString('en-IE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function calSvg() { return '<svg width="14" height="14" viewBox="0 0 32 32" fill="currentColor" style="opacity:0.55"><path d="M26 4h-4V2h-2v2h-8V2h-2v2H6C4.9 4 4 4.9 4 6v20c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 22H6V12h20v14zm0-16H6V6h4v2h2V6h8v2h2V6h4v4z"/></svg>'; }
  function chevSvg() { return '<svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor" style="opacity:0.4;flex:none"><path d="M22 16L12 26l-1.414-1.414L19.172 16l-8.586-8.586L12 6z"/></svg>'; }

  function dateRange(s, e) {
    if (!s && !e) return '—';
    const fmt = d => new Date(d + 'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    return s && e ? fmt(s) + ' – ' + fmt(e) : fmt(s || e);
  }

  function renderTrip(trip) {
    const isActive = trip.start_date && new Date(trip.start_date) <= new Date() &&
      (!trip.end_date || new Date(trip.end_date) >= new Date());
    const bal = trip.myBalance;
    const balStr = Math.abs(bal) < 0.005 ? 'Settled' : fmt(bal);
    const balLabel = Math.abs(bal) < 0.005 ? 'All cleared' : (bal > 0 ? "You're owed" : 'You owe');
    const balColor = Math.abs(bal) < 0.005 ? 'var(--text-secondary)' : (bal > 0 ? 'var(--support-success)' : 'var(--text-primary)');

    const avatarHtml = trip.members.slice(0,4).map((m,i) =>
      `<div style="width:24px;height:24px;border-radius:50%;background:${avatarColor(i)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.625rem;font-weight:600;${i>0?'margin-left:-5px;':''}border:2px solid var(--layer-02);">${m.name.slice(0,2).toUpperCase()}</div>`
    ).join('');

    const extra = trip.members.length > 4
      ? `<div style="width:24px;height:24px;border-radius:50%;background:#6f6f6f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.625rem;font-weight:600;margin-left:-5px;border:2px solid var(--layer-02);">+${trip.members.length-4}</div>`
      : '';

    return `
      <a href="trip-overview.html?id=${trip.id}" class="dl-row" style="display:flex;align-items:center;gap:24px;padding:20px 24px;border-bottom:1px solid var(--border-subtle-00);text-decoration:none;color:inherit;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <span style="font-size:1rem;font-weight:600;">${trip.name}</span>
            ${isActive ? '<span style="font-size:0.6875rem;letter-spacing:0.32px;color:var(--blue-70);background:var(--blue-20);padding:1px 8px;border-radius:999px;">Active</span>' : ''}
          </div>
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
            <span style="display:inline-flex;align-items:center;gap:6px;font-size:0.8125rem;color:var(--text-secondary);">
              ${calSvg()} ${dateRange(trip.start_date, trip.end_date)}
            </span>
            <span style="width:1px;height:14px;background:var(--border-subtle-01);"></span>
            <div style="display:flex;align-items:center;">
              ${avatarHtml}${extra}
              <span style="margin-left:10px;font-size:0.8125rem;color:var(--text-secondary);">${trip.members.length} people</span>
            </div>
          </div>
        </div>
        <div style="text-align:right;flex:none;">
          <p style="margin:0 0 2px;font-size:1.125rem;font-weight:400;color:${balColor};font-variant-numeric:tabular-nums;">${balStr}</p>
          <p style="margin:0;font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);">${balLabel}</p>
        </div>
        ${chevSvg()}
      </a>`;
  }

  async function loadTrips() {
    const trips = await fetch('/api/trips').then(r => r.json());
    const active = trips.filter(t => t.start_date && new Date(t.start_date) <= new Date() && (!t.end_date || new Date(t.end_date) >= new Date()));
    document.getElementById('summary-line').textContent = `${trips.length} trip${trips.length !== 1 ? 's' : ''} · ${active.length} active`;
    const list = document.getElementById('trip-list');
    if (!trips.length) {
      list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">No trips yet — create your first one.</div>';
    } else {
      list.innerHTML = trips.map(renderTrip).join('');
    }
  }

  loadTrips();

  // ── Modal ──────────────────────────────────────────────────────────────
  const modal = document.getElementById('modal');
  let participants = ['You', 'Maya', 'Sam'];

  function renderChips() {
    const container = document.getElementById('chips');
    container.innerHTML = '';
    participants.forEach((name, i) => {
      const chip = document.createElement('span');
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 4px 0 12px;background:#393939;color:#fff;font-size:0.8125rem;border-radius:999px;font-family:var(--font-family-sans);';
      chip.textContent = name;
      if (name !== 'You') {
        const btn = document.createElement('button');
        btn.className = 'dl-chipx';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 32 32" fill="white"><path d="M24 9.4L22.6 8 16 14.6 9.4 8 8 9.4l6.6 6.6L8 22.6 9.4 24l6.6-6.6 6.6 6.6 1.4-1.4-6.6-6.6z"/></svg>';
        btn.addEventListener('click', () => { participants.splice(i,1); renderChips(); });
        chip.appendChild(btn);
      }
      container.appendChild(chip);
    });
  }
  renderChips();

  document.getElementById('open-modal').addEventListener('click', () => { modal.style.display = 'flex'; });
  function closeModal() { modal.style.display = 'none'; }
  document.getElementById('close-modal').addEventListener('click', closeModal);
  document.getElementById('cancel-modal').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

  document.getElementById('new-person').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = e.target.value.trim();
      if (val) { participants.push(val); e.target.value = ''; renderChips(); }
    }
  });

  document.getElementById('create-trip').addEventListener('click', async () => {
    const name = document.getElementById('trip-name').value.trim();
    if (!name) { document.getElementById('trip-name').focus(); return; }
    const res = await fetch('/api/trips', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        startDate: document.getElementById('start-date').value || null,
        endDate:   document.getElementById('end-date').value || null,
        people:    participants,
      }),
    });
    const { id } = await res.json();
    window.location.href = `trip-overview.html?id=${id}`;
  });
</script>
</body>
</html>
