<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driftlog — Settle Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --white-0:#ffffff; --blue-50:#4589ff; --blue-60:#0f62fe;
      --gray-40:#a8a8a8; --gray-80:#393939; --gray-100:#161616;
      --font-family-sans:'IBM Plex Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      --background:#ffffff; --text-primary:#161616; --text-secondary:#525252;
      --text-on-color:#ffffff; --layer-02:#ffffff;
      --border-subtle-01:#c6c6c6; --link-primary:#0f62fe;
      --support-success:#24a148; --green-10:#defbe6;
      --background-hover:rgba(141,141,141,0.12);
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--background);font-family:var(--font-family-sans);color:var(--text-primary)}
    .dl-back{display:inline-flex;align-items:center;gap:8px;font-size:0.875rem;color:var(--link-primary);text-decoration:none}
    .dl-back:hover{text-decoration:underline}
    .dl-rec{height:40px;border:none;background:var(--gray-100);color:var(--text-on-color);font-size:0.875rem;letter-spacing:0.16px;padding:0 16px;cursor:pointer;transition:background 110ms;font-family:var(--font-family-sans)}
    .dl-rec:hover{background:var(--gray-80)}
    .dl-undo{border:none;background:transparent;cursor:pointer;font-size:0.75rem;letter-spacing:0.32px;color:var(--link-primary);padding:6px 8px;font-family:var(--font-family-sans)}
    .dl-undo:hover{background:var(--background-hover)}
  </style>
</head>
<body>

<header style="height:48px;background:var(--gray-100);color:var(--white-0);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:10;">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:20px;height:20px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;">
      <span style="color:var(--white-0);font-weight:600;font-size:0.8125rem;line-height:1;">$</span>
    </div>
    <span style="font-size:0.875rem;"><span style="font-weight:600;">Driftlog</span> <span style="color:var(--gray-40);">Trips</span></span>
  </div>
</header>

<main style="max-width:720px;margin:0 auto;padding:32px 16px 80px;">
  <a id="back-link" href="trips.html" class="dl-back" style="margin-bottom:32px;">
    <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor"><path d="M14 26l1.41-1.41L7.83 17H28v-2H7.83l7.59-7.59L14 6 4 16z"/></svg>
    Back
  </a>

  <h1 style="margin:0 0 8px;font-size:1.75rem;line-height:1.28572;font-weight:400;">Settle up</h1>
  <p id="subtitle" style="margin:0 0 32px;font-size:0.875rem;line-height:1.42857;color:var(--text-secondary);max-width:520px;">Loading…</p>

  <div id="success-banner" style="display:none;gap:12px;align-items:flex-start;background:var(--green-10);border-left:3px solid var(--support-success);padding:16px;margin-bottom:24px;">
    <svg width="20" height="20" viewBox="0 0 32 32" fill="#24a148" style="margin-top:1px;flex:none;"><path d="M16 2a14 14 0 1 0 14 14A14 14 0 0 0 16 2zm-2 19.59L8 15.587 9.412 14.17l4.588 4.588 10-10L25.41 10z"/></svg>
    <div>
      <p style="margin:0 0 2px;font-size:0.875rem;font-weight:600;color:#161616;">All settled up</p>
      <p style="margin:0;font-size:0.875rem;color:#393939;">Every balance is back to zero. Have a good one.</p>
    </div>
  </div>

  <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;">
    <h2 style="margin:0;font-size:0.875rem;font-weight:600;letter-spacing:0.16px;">Suggested payments</h2>
    <span id="progress" style="font-size:0.75rem;letter-spacing:0.32px;color:var(--text-secondary);">—</span>
  </div>

  <div id="payment-list" style="display:flex;flex-direction:column;gap:1px;background:var(--border-subtle-01);border:1px solid var(--border-subtle-01);"></div>

  <p style="margin:24px 0 0;font-size:0.75rem;line-height:1.33333;letter-spacing:0.32px;color:#6f6f6f;">Recording a payment marks it as transferred outside the app. Balances update once all suggested payments are recorded.</p>
</main>

<script>
  const params = new URLSearchParams(location.search);
  const tripId = params.get('tripId');
  if (!tripId) location.href = 'trips.html';

  const COLORS = ['#0f62fe','#007d79','#8a3ffc','#d02670','#0072c3','#6f6f6f'];
  function col(members, id) {
    const i = members.findIndex(m => m.id === id);
    return COLORS[i >= 0 ? i % COLORS.length : 0];
  }
  function fmt(n) { return '€' + n.toLocaleString('en-IE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function initials(name) { return name.slice(0,2).toUpperCase(); }
  function avatar(name, color, size) {
    const el = document.createElement('div');
    el.style.cssText = `width:${size}px;height:${size}px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;`;
    el.textContent = initials(name);
    return el;
  }

  let payments = [];
  let trip = null;

  async function load() {
    [payments, trip] = await Promise.all([
      fetch(`/api/trips/${tripId}/settle`).then(r => r.json()),
      fetch(`/api/trips/${tripId}`).then(r => r.json()),
    ]);
    document.getElementById('back-link').href = `trip-overview.html?id=${tripId}`;
    document.getElementById('back-link').innerHTML = `<svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor"><path d="M14 26l1.41-1.41L7.83 17H28v-2H7.83l7.59-7.59L14 6 4 16z"/></svg> ${trip.name}`;
    document.getElementById('subtitle').innerHTML = `The fewest payments that zero out everyone's balance. Driftlog found <strong style="color:var(--text-primary);">${payments.length} payment${payments.length!==1?'s':''}</strong> to clear all ${trip.members.length} balances.`;
    render();
  }

  function render() {
    const doneCount = payments.filter(p => p.recorded).length;
    document.getElementById('progress').textContent = `${doneCount} of ${payments.length} recorded`;
    document.getElementById('success-banner').style.display = (payments.length && doneCount === payments.length) ? 'flex' : 'none';

    const list = document.getElementById('payment-list');
    list.innerHTML = '';

    if (!payments.length) {
      list.innerHTML = '<div style="padding:24px;color:var(--text-secondary);font-size:0.875rem;">All balances are already zero — nothing to settle!</div>';
      return;
    }

    payments.forEach((p, i) => {
      const fromColor = col(trip.members, p.from.id);
      const toColor   = col(trip.members, p.to.id);
      const card = document.createElement('div');
      card.style.cssText = 'display:flex;align-items:center;gap:20px;padding:20px;background:var(--layer-02);';

      const persons = document.createElement('div');
      persons.style.cssText = `display:flex;align-items:center;gap:14px;flex:1;min-width:0;opacity:${p.recorded?'0.45':'1'};`;

      const fromGroup = document.createElement('div');
      fromGroup.style.cssText = 'display:flex;align-items:center;gap:10px;';
      fromGroup.appendChild(avatar(p.from.name, fromColor, 36));
      const fromName = document.createElement('span');
      fromName.style.cssText = 'font-size:0.875rem;font-weight:600;';
      fromName.textContent = p.from.name;
      fromGroup.appendChild(fromName);

      const arr = document.createElementNS('http://www.w3.org/2000/svg','svg');
      arr.setAttribute('width','16'); arr.setAttribute('height','16'); arr.setAttribute('viewBox','0 0 32 32'); arr.setAttribute('fill','currentColor');
      arr.style.opacity='0.5';
      arr.innerHTML='<path d="M18 6l-1.43 1.393L24.15 15H4v2h20.15l-7.58 7.573L18 26l10-10z"/>';

      const toGroup = document.createElement('div');
      toGroup.style.cssText = 'display:flex;align-items:center;gap:10px;';
      toGroup.appendChild(avatar(p.to.name, toColor, 36));
      const toName = document.createElement('span');
      toName.style.cssText = 'font-size:0.875rem;font-weight:600;';
      toName.textContent = p.to.name;
      toGroup.appendChild(toName);

      persons.appendChild(fromGroup); persons.appendChild(arr); persons.appendChild(toGroup);

      const amt = document.createElement('span');
      amt.style.cssText = `font-size:1.25rem;font-weight:400;font-variant-numeric:tabular-nums;opacity:${p.recorded?'0.45':'1'};`;
      amt.textContent = fmt(p.amount);

      const actionWrap = document.createElement('div');
      actionWrap.style.cssText = 'flex:none;width:160px;display:flex;justify-content:flex-end;';

      if (p.recorded) {
        const statusWrap = document.createElement('div');
        statusWrap.style.cssText = 'display:flex;align-items:center;gap:12px;';
        const label = document.createElement('span');
        label.style.cssText = 'display:inline-flex;align-items:center;gap:6px;font-size:0.875rem;color:#24a148;';
        label.innerHTML = '<svg width="16" height="16" viewBox="0 0 32 32" fill="#24a148"><path d="M16 2a14 14 0 1 0 14 14A14 14 0 0 0 16 2zm-2 19.59L8 15.587 9.412 14.17l4.588 4.588 10-10L25.41 10z"/></svg> Settled';
        const undo = document.createElement('button');
        undo.className = 'dl-undo';
        undo.textContent = 'Undo';
        undo.addEventListener('click', () => undoPayment(p, i));
        statusWrap.appendChild(label); statusWrap.appendChild(undo);
        actionWrap.appendChild(statusWrap);
      } else {
        const rec = document.createElement('button');
        rec.className = 'dl-rec';
        rec.textContent = 'Record payment';
        rec.addEventListener('click', () => recordPayment(p, i));
        actionWrap.appendChild(rec);
      }

      card.appendChild(persons); card.appendChild(amt); card.appendChild(actionWrap);
      list.appendChild(card);
    });
  }

  async function recordPayment(p, i) {
    const res = await fetch(`/api/trips/${tripId}/settle`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fromPersonId: p.from.id, toPersonId: p.to.id, amount: p.amount }),
    });
    const data = await res.json();
    payments[i].recorded = true;
    payments[i].id = data.id;
    render();
  }

  async function undoPayment(p, i) {
    if (p.id) {
      await fetch(`/api/trips/${tripId}/settle/${p.id}`, { method: 'DELETE' });
    }
    payments[i].recorded = false;
    render();
  }

  load();
</script>
</body>
</html>
