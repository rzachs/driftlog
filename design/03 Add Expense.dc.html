<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['IBM Plex Sans','system-ui','-apple-system','BlinkMacSystemFont','sans-serif'] },
          colors: {
            driftlog: {
              panel:           '#161616',
              blue:            '#0f62fe',
              'blue-hover':    '#0050e6',
              'blue-active':   '#002d9c',
              'blue-accent':   '#4589ff',
              field:           '#f4f4f4',
              'field-hover':   '#e8e8e8',
              'border-subtle': '#c6c6c6',
              'border-strong': '#8d8d8d',
              'gray-40':       '#a8a8a8',
              'gray-80':       '#393939',
              'text-2':        '#525252',
            }
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    input, button, select, textarea { font-family: inherit; color: inherit; }
    input::placeholder { color: rgba(22,22,22,0.4); }
    input:focus, select:focus { outline: 2px solid #0f62fe; outline-offset: -2px; }
    select { -webkit-appearance: none; appearance: none; }
  </style>
</helmet>

<div data-screen-label="Add Expense" class="min-h-screen font-sans bg-white text-[#161616]">

  <header class="h-12 bg-driftlog-panel text-white flex items-center px-4 sticky top-0 z-10">
    <div class="flex items-center gap-[10px]">
      <div class="w-5 h-5 bg-driftlog-blue-accent flex items-center justify-center">
        <span class="font-semibold text-[0.8125rem] leading-none">$</span>
      </div>
      <span class="text-sm"><span class="font-semibold">Driftlog</span> <span class="text-driftlog-gray-40">Trips</span></span>
    </div>
  </header>

  <main class="max-w-[640px] mx-auto px-4 pt-8 pb-[120px]">

    <a href="02 Trip Overview.dc.html" class="inline-flex items-center gap-2 text-sm text-driftlog-blue no-underline mb-6 hover:underline">
      <img src="carbon/icons/arrow-left.svg" width="16" height="16" alt="" /> Lisbon long weekend
    </a>

    <h1 class="mb-10 text-[1.75rem] leading-[1.28572] font-normal">Add expense</h1>

    <!-- Amount -->
    <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-2">Amount</label>
    <div class="flex items-stretch mb-8 border-b border-driftlog-border-strong bg-driftlog-field">
      <span class="flex items-center px-4 text-[1.75rem] font-light text-driftlog-text-2">€</span>
      <input type="text" inputmode="decimal" value="{{ amount }}" oninput="{{ onAmount }}" placeholder="0.00" class="flex-1 h-16 border-0 bg-transparent text-[#161616] text-[1.75rem] font-light p-0 tabular-nums" />
    </div>

    <!-- Description -->
    <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-2">Description</label>
    <input type="text" value="{{ desc }}" oninput="{{ onDesc }}" placeholder="e.g. Dinner at Time Out Market" class="w-full h-12 border-0 border-b border-driftlog-border-strong bg-driftlog-field text-[#161616] text-sm px-4 mb-8" />

    <!-- Paid by + Date -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div>
        <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-2">Paid by</label>
        <div class="relative">
          <select value="{{ payer }}" onchange="{{ onPayer }}" class="w-full h-12 border-0 border-b border-driftlog-border-strong bg-driftlog-field text-[#161616] text-sm pl-4 pr-10 cursor-pointer">
            <option value="You">You</option>
            <option value="Maya">Maya</option>
            <option value="Sam">Sam</option>
            <option value="Theo">Theo</option>
          </select>
          <img src="carbon/icons/chevron-down.svg" width="16" height="16" alt="" class="absolute right-4 top-4 pointer-events-none opacity-70" />
        </div>
      </div>
      <div>
        <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-2">Date</label>
        <input type="date" value="{{ date }}" onchange="{{ onDate }}" class="w-full h-12 border-0 border-b border-driftlog-border-strong bg-driftlog-field text-[#161616] text-sm px-4" />
      </div>
    </div>

    <!-- Split method -->
    <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-3">Split method</label>
    <div class="flex gap-8 mb-8">
      <label class="flex items-center gap-2 cursor-pointer text-sm">
        <span onclick="{{ setEven }}" class="w-[18px] h-[18px] rounded-full border border-driftlog-border-strong flex items-center justify-center cursor-pointer">
          <sc-if value="{{ isEven }}" hint-placeholder-val="{{ true }}"><span class="w-2 h-2 rounded-full bg-driftlog-blue"></span></sc-if>
        </span>
        <span onclick="{{ setEven }}">Split evenly</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer text-sm">
        <span onclick="{{ setCustom }}" class="w-[18px] h-[18px] rounded-full border border-driftlog-border-strong flex items-center justify-center cursor-pointer">
          <sc-if value="{{ isCustom }}" hint-placeholder-val="{{ false }}"><span class="w-2 h-2 rounded-full bg-driftlog-blue"></span></sc-if>
        </span>
        <span onclick="{{ setCustom }}">Custom amounts</span>
      </label>
    </div>

    <!-- Split between -->
    <div class="flex items-baseline justify-between mb-3">
      <label class="text-xs tracking-[0.32px] text-driftlog-text-2">Split between</label>
      <span class="text-xs tracking-[0.32px]" style="color:{{ remainColor }}">{{ remainNote }}</span>
    </div>
    <div class="border border-driftlog-border-subtle mb-12">
      <sc-for list="{{ rows }}" as="r" hint-placeholder-count="4">
        <div class="flex items-center gap-3 px-4 min-h-14 border-b border-[#e0e0e0]" style="background:{{ r.bg }}">
          <span onclick="{{ r.toggle }}" class="w-[18px] h-[18px] flex-none border border-driftlog-border-strong flex items-center justify-center cursor-pointer" style="background:{{ r.boxBg }}">
            <sc-if value="{{ r.checked }}" hint-placeholder-val="{{ true }}">
              <img src="carbon/icons/checkmark.svg" width="14" height="14" alt="" class="invert" />
            </sc-if>
          </span>
          <div class="w-7 h-7 rounded-full flex-none flex items-center justify-center text-[0.6875rem] font-semibold text-white" style="background:{{ r.avatarBg }}">{{ r.initials }}</div>
          <span onclick="{{ r.toggle }}" class="flex-1 text-sm cursor-pointer" style="color:{{ r.nameColor }}">{{ r.name }}</span>
          <sc-if value="{{ isCustom }}" hint-placeholder-val="{{ false }}">
            <div class="flex items-center gap-1" style="opacity:{{ r.editOpacity }}">
              <span class="text-sm text-driftlog-text-2">€</span>
              <input type="text" inputmode="decimal" value="{{ r.customVal }}" oninput="{{ r.onCustom }}" disabled="{{ r.disabled }}" class="w-20 h-10 border-0 border-b border-driftlog-border-strong bg-white text-[#161616] text-sm py-0 px-2 text-right tabular-nums" />
            </div>
          </sc-if>
          <sc-if value="{{ isEven }}" hint-placeholder-val="{{ true }}">
            <span class="text-sm tabular-nums" style="color:{{ r.nameColor }}">{{ r.shareStr }}</span>
          </sc-if>
        </div>
      </sc-for>
    </div>

  </main>

  <!-- Sticky footer -->
  <div class="fixed bottom-0 left-0 right-0 flex h-16 border-t border-driftlog-border-subtle">
    <a href="02 Trip Overview.dc.html" class="flex-1 max-w-[50%] bg-driftlog-panel text-white flex items-center px-4 text-sm tracking-[0.16px] no-underline transition-colors duration-[110ms] hover:bg-driftlog-gray-80">Cancel</a>
    <button onclick="{{ onAdd }}" class="flex-1 max-w-[50%] border-0 bg-driftlog-blue text-white flex items-center justify-between px-4 text-sm tracking-[0.16px] cursor-pointer transition-colors duration-[110ms] hover:bg-driftlog-blue-hover active:bg-driftlog-blue-active">
      <span>Add expense</span>
      <img src="carbon/icons/add.svg" width="20" height="20" alt="" class="invert" />
    </button>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = {
    amount: "164.00",
    desc: "Dinner at Time Out Market",
    payer: "You",
    date: "2026-06-13",
    method: "even",
    selected: { You: true, Maya: true, Sam: true, Theo: true },
    custom:   { You: "",   Maya: "",   Sam: "",   Theo: ""   },
  };

  fmt(n) { return "€" + n.toLocaleString("en-IE", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  renderVals() {
    const s = this.state;
    const avatars  = { You: "#0f62fe", Maya: "#007d79", Sam: "#8a3ffc", Theo: "#d02670" };
    const initials = { You: "YO",      Maya: "MA",      Sam: "SA",      Theo: "TH"      };
    const names = ["You", "Maya", "Sam", "Theo"];
    const total = parseFloat(s.amount) || 0;
    const sel   = names.filter((n) => s.selected[n]);
    const evenShare = sel.length ? total / sel.length : 0;
    const isCustom  = s.method === "custom";

    const customSum = sel.reduce((a, n) => a + (parseFloat(s.custom[n]) || 0), 0);
    const remaining = total - customSum;

    const rows = names.map((n) => {
      const checked = !!s.selected[n];
      return {
        name: n, initials: initials[n], avatarBg: avatars[n], checked,
        bg:        checked ? "#ffffff" : "#f4f4f4",
        boxBg:     checked ? "#0f62fe" : "transparent",
        nameColor: checked ? "#161616" : "#525252",
        shareStr:  checked ? this.fmt(evenShare) : "—",
        customVal: s.custom[n],
        disabled:    !checked,
        editOpacity: checked ? "1" : "0.35",
        toggle:   () => this.setState((st) => ({ selected: { ...st.selected, [n]: !st.selected[n] } })),
        onCustom: (e) => this.setState((st) => ({ custom:   { ...st.custom,   [n]:  e.target.value  } })),
      };
    });

    let remainNote, remainColor;
    if (isCustom) {
      const r = Math.round(remaining * 100) / 100;
      if (Math.abs(r) < 0.005) { remainNote = "Fully allocated"; remainColor = "#24a148"; }
      else if (r > 0)          { remainNote = this.fmt(r)  + " left"; remainColor = "#da1e28"; }
      else                     { remainNote = this.fmt(-r) + " over"; remainColor = "#da1e28"; }
    } else {
      remainNote  = sel.length + " people · " + this.fmt(evenShare) + " each";
      remainColor = "#525252";
    }

    return {
      amount: s.amount, desc: s.desc, payer: s.payer, date: s.date,
      isEven: !isCustom, isCustom, rows, remainNote, remainColor,
      onAmount: (e) => this.setState({ amount: e.target.value }),
      onDesc:   (e) => this.setState({ desc:   e.target.value }),
      onPayer:  (e) => this.setState({ payer:  e.target.value }),
      onDate:   (e) => this.setState({ date:   e.target.value }),
      setEven:   () => this.setState({ method: "even"   }),
      setCustom: () => this.setState({ method: "custom" }),
      onAdd: () => { window.location.href = "02 Trip Overview.dc.html"; },
    };
  }
}

</script>
</body>
</html>
