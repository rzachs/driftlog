<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['IBM Plex Sans','system-ui','-apple-system','BlinkMacSystemFont','sans-serif'] },
          colors: {
            driftlog: {
              panel:           '#161616',
              blue:            '#0f62fe',
              'blue-hover':    '#0050e6',
              'blue-active':   '#002d9c',
              'blue-accent':   '#4589ff',
              field:           '#f4f4f4',
              'field-hover':   '#e8e8e8',
              'border-subtle': '#c6c6c6',
              'border-strong': '#8d8d8d',
              'gray-40':       '#a8a8a8',
              'gray-80':       '#393939',
              'text-2':        '#525252',
              'text-helper':   '#6f6f6f',
            }
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f4f4f4; }
    input, button, select, textarea { font-family: inherit; color: inherit; }
    input::placeholder { color: rgba(22,22,22,0.4); }
    input:focus { outline: 2px solid #0f62fe; outline-offset: -2px; }
  </style>
</helmet>

<div data-screen-label="My Trips" class="min-h-screen font-sans bg-driftlog-field text-[#161616]">

  <header class="h-12 bg-driftlog-panel text-white flex items-center px-4 sticky top-0 z-10">
    <div class="flex items-center gap-[10px]">
      <div class="w-5 h-5 bg-driftlog-blue-accent flex items-center justify-center">
        <span class="font-semibold text-[0.8125rem] leading-none">$</span>
      </div>
      <span class="text-sm"><span class="font-semibold">Driftlog</span> <span class="text-driftlog-gray-40">Trips</span></span>
    </div>
    <div class="ml-auto flex items-center h-full">
      <button aria-label="Settings" class="w-12 h-12 border-0 bg-transparent cursor-pointer flex items-center justify-center hover:bg-driftlog-field-hover">
        <img src="carbon/icons/settings.svg" width="20" height="20" alt="" class="invert" />
      </button>
      <div class="w-8 h-8 rounded-full bg-driftlog-blue text-white flex items-center justify-center text-xs font-semibold ml-2">YO</div>
    </div>
  </header>

  <main class="max-w-[880px] mx-auto px-4 pt-12 pb-20">

    <div class="flex items-end justify-between gap-6 mb-8">
      <div>
        <h1 class="text-[2rem] leading-[1.25] font-normal mb-[6px]">Your trips</h1>
        <p class="text-sm text-driftlog-text-2">{{ summaryLine }}</p>
      </div>
      <button onclick="{{ openModal }}" class="flex-none h-12 border-0 bg-driftlog-blue text-white text-sm tracking-[0.16px] cursor-pointer inline-flex items-center gap-12 px-4 transition-colors duration-[110ms] hover:bg-driftlog-blue-hover active:bg-driftlog-blue-active">
        <span class="whitespace-nowrap">Create trip</span>
        <img src="carbon/icons/add.svg" width="20" height="20" alt="" class="invert" />
      </button>
    </div>

    <div class="border border-driftlog-border-subtle bg-white">
      <sc-for list="{{ trips }}" as="t" hint-placeholder-count="4">
        <a href="{{ t.href }}" class="flex items-center gap-6 py-5 px-6 border-b border-[#e0e0e0] no-underline text-[#161616] transition-colors duration-[70ms] hover:bg-driftlog-field-hover">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-[10px] mb-2">
              <span class="text-base font-semibold">{{ t.name }}</span>
              <sc-if value="{{ t.active }}" hint-placeholder-val="{{ false }}">
                <span class="text-[0.6875rem] tracking-[0.32px] text-[#0043ce] bg-[#d0e2ff] py-px px-2 rounded-full">Active</span>
              </sc-if>
            </div>
            <div class="flex items-center gap-[14px] flex-wrap">
              <span class="inline-flex items-center gap-[6px] text-[0.8125rem] text-driftlog-text-2">
                <img src="carbon/icons/calendar.svg" width="14" height="14" alt="" class="opacity-[0.55]" /> {{ t.dateStr }}
              </span>
              <span class="w-px h-[14px] bg-driftlog-border-subtle"></span>
              <div class="flex items-center">
                <sc-for list="{{ t.avatars }}" as="a" hint-placeholder-count="4">
                  <div class="w-6 h-6 rounded-full flex items-center justify-center text-[0.625rem] font-semibold text-white -ml-[5px] border-2 border-white" style="background:{{ a.bg }}">{{ a.initials }}</div>
                </sc-for>
                <span class="ml-[10px] text-[0.8125rem] text-driftlog-text-2">{{ t.peopleStr }}</span>
              </div>
            </div>
          </div>
          <div class="text-right flex-none">
            <p class="mb-[2px] text-lg font-normal tabular-nums" style="color:{{ t.balColor }}">{{ t.balAmount }}</p>
            <p class="text-xs tracking-[0.32px] text-driftlog-text-2">{{ t.balLabel }}</p>
          </div>
          <img src="carbon/icons/chevron-right.svg" width="16" height="16" alt="" class="opacity-40 flex-none" />
        </a>
      </sc-for>
    </div>

  </main>

  <!-- Create trip modal -->
  <sc-if value="{{ modalOpen }}" hint-placeholder-val="{{ false }}">
    <div onclick="{{ closeModal }}" class="fixed inset-0 bg-[rgba(0,0,0,0.6)] z-50 flex items-center justify-center p-6">
      <div onclick="{{ stop }}" class="w-full max-w-[480px] bg-white shadow-[0_4px_16px_rgba(0,0,0,0.3)]">

        <div class="flex items-start justify-between p-5 pb-2">
          <div>
            <p class="mb-[2px] text-xs tracking-[0.32px] text-driftlog-text-2">Driftlog</p>
            <h2 class="text-xl font-normal">Create trip</h2>
          </div>
          <button onclick="{{ closeModal }}" aria-label="Close" class="w-10 h-10 border-0 bg-transparent cursor-pointer flex items-center justify-center text-driftlog-text-2 hover:bg-driftlog-field-hover">
            <img src="carbon/icons/close.svg" width="20" height="20" alt="" />
          </button>
        </div>

        <div class="px-5 pb-6 pt-4">
          <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-2">Trip name</label>
          <input type="text" value="{{ tripName }}" oninput="{{ onTripName }}" placeholder="e.g. Lisbon long weekend" class="w-full h-12 border-0 border-b border-driftlog-border-strong bg-driftlog-field text-[#161616] text-sm px-4 mb-6" />

          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-2">Start date</label>
              <input type="date" value="{{ start }}" onchange="{{ onStart }}" class="w-full h-12 border-0 border-b border-driftlog-border-strong bg-driftlog-field text-[#161616] text-sm px-4" />
            </div>
            <div>
              <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-2">End date</label>
              <input type="date" value="{{ end }}" onchange="{{ onEnd }}" class="w-full h-12 border-0 border-b border-driftlog-border-strong bg-driftlog-field text-[#161616] text-sm px-4" />
            </div>
          </div>

          <label class="block text-xs tracking-[0.32px] text-driftlog-text-2 mb-2">People</label>
          <div class="flex flex-wrap gap-2 mb-3">
            <sc-for list="{{ chips }}" as="c" hint-placeholder-count="2">
              <span class="inline-flex items-center gap-[6px] h-8 pl-3 pr-1 bg-driftlog-gray-80 text-white text-[0.8125rem] rounded-full">
                {{ c.name }}
                <sc-if value="{{ c.removable }}" hint-placeholder-val="{{ true }}">
                  <button onclick="{{ c.remove }}" aria-label="Remove" class="w-6 h-6 border-0 bg-transparent cursor-pointer rounded-full flex items-center justify-center p-0 hover:bg-[rgba(255,255,255,0.25)]">
                    <img src="carbon/icons/close.svg" width="14" height="14" alt="" class="invert" />
                  </button>
                </sc-if>
              </span>
            </sc-for>
          </div>
          <input type="text" value="{{ newPerson }}" oninput="{{ onNewPerson }}" onkeydown="{{ onAddKey }}" placeholder="Type a name, press Enter to add" class="w-full h-10 border-0 border-b border-driftlog-border-strong bg-driftlog-field text-[#161616] text-sm px-4" />
        </div>

        <div class="flex h-16 border-t border-driftlog-border-subtle">
          <button onclick="{{ closeModal }}" class="flex-1 border-0 bg-driftlog-panel text-white flex items-center px-4 text-sm tracking-[0.16px] cursor-pointer transition-colors duration-[110ms] hover:bg-driftlog-gray-80">Cancel</button>
          <button onclick="{{ createTrip }}" class="flex-1 border-0 bg-driftlog-blue text-white flex items-center justify-between px-4 text-sm tracking-[0.16px] cursor-pointer transition-colors duration-[110ms] hover:bg-driftlog-blue-hover">
            <span class="whitespace-nowrap">Create trip</span>
            <img src="carbon/icons/arrow-right.svg" width="20" height="20" alt="" class="invert" />
          </button>
        </div>

      </div>
    </div>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:880,&quot;height&quot;:760}}">
class Component extends DCLogic {
  state = {
    modalOpen: false,
    tripName: "",
    start: "",
    end: "",
    participants: ["You", "Maya", "Sam"],
    newPerson: "",
  };

  renderVals() {
    const C = { blue: "#0f62fe", teal: "#007d79", purple: "#8a3ffc", magenta: "#d02670", cyan: "#0072c3", gray: "#6f6f6f" };
    const av = (initials, bg) => ({ initials, bg });

    const trips = [
      {
        name: "Lisbon long weekend", active: true, dateStr: "Jun 12 – 15, 2026",
        avatars: [av("YO", C.blue), av("MA", C.teal), av("SA", C.purple), av("TH", C.magenta)],
        peopleStr: "4 people", balAmount: "+€436.00", balColor: "#24a148", balLabel: "You're owed",
        href: "02 Trip Overview.dc.html",
      },
      {
        name: "NYE in Edinburgh", active: false, dateStr: "Dec 30, 2025 – Jan 2, 2026",
        avatars: [av("YO", C.blue), av("MA", C.teal), av("SA", C.purple), av("+2", C.gray)],
        peopleStr: "6 people", balAmount: "−€74.50", balColor: "#161616", balLabel: "You owe",
        href: "02 Trip Overview.dc.html",
      },
      {
        name: "Dolomites hut-to-hut", active: false, dateStr: "Sep 5 – 11, 2025",
        avatars: [av("YO", C.blue), av("TH", C.magenta), av("RO", C.cyan), av("+2", C.gray)],
        peopleStr: "5 people", balAmount: "Settled", balColor: "#525252", balLabel: "All cleared",
        href: "02 Trip Overview.dc.html",
      },
      {
        name: "Cousins' beach house", active: false, dateStr: "Aug 12 – 19, 2024",
        avatars: [av("YO", C.blue), av("MA", C.teal), av("EL", C.cyan), av("+2", C.gray)],
        peopleStr: "5 people", balAmount: "Settled", balColor: "#525252", balLabel: "All cleared",
        href: "02 Trip Overview.dc.html",
      },
    ];

    const chips = this.state.participants.map((name, i) => ({
      name,
      removable: name !== "You",
      remove: (e) => {
        e.preventDefault(); e.stopPropagation();
        this.setState((s) => ({ participants: s.participants.filter((_, j) => j !== i) }));
      },
    }));

    const addPerson = () => {
      const n = this.state.newPerson.trim();
      if (!n) return;
      this.setState((s) => ({ participants: [...s.participants, n], newPerson: "" }));
    };

    return {
      trips,
      summaryLine: "4 trips · 1 active",
      modalOpen: this.state.modalOpen,
      tripName: this.state.tripName,
      start: this.state.start,
      end: this.state.end,
      newPerson: this.state.newPerson,
      chips,
      openModal:   () => this.setState({ modalOpen: true }),
      closeModal:  () => this.setState({ modalOpen: false }),
      stop:        (e) => e.stopPropagation(),
      onTripName:  (e) => this.setState({ tripName: e.target.value }),
      onStart:     (e) => this.setState({ start: e.target.value }),
      onEnd:       (e) => this.setState({ end: e.target.value }),
      onNewPerson: (e) => this.setState({ newPerson: e.target.value }),
      onAddKey:    (e) => { if (e.key === "Enter") { e.preventDefault(); addPerson(); } },
      createTrip:  () => { window.location.href = "02 Trip Overview.dc.html"; },
    };
  }
}

</script>
</body>
</html>
